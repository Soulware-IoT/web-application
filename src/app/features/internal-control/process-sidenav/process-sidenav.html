<aside
  class="grid h-full overflow-y-auto"
  style="grid-template-rows: auto 1fr; background-color: #fafbfc; border-right: 1px solid #e2e8f0"
  [attr.aria-label]="'internalControl.processes.header' | transloco"
>
  <!-- ── Panel header ──────────────────────────────────────────────────── -->
  <div
    class="grid items-center px-4"
    style="grid-template-columns: 1fr auto; height: 57px; border-bottom: 1px solid #e2e8f0"
  >
    <h2 class="text-sm font-semibold" style="color: #1a1a1a">
      {{ 'internalControl.processes.header' | transloco }}
    </h2>
  </div>

  <!-- ── Process list ──────────────────────────────────────────────────── -->
  <nav [attr.aria-label]="'internalControl.processes.header' | transloco" class="px-2 py-2">
    @if (loading()) {
      <ul class="grid gap-0.5" aria-hidden="true">
        @for (i of [1, 2, 3, 4]; track i) {
          <li class="px-2 py-2">
            <div class="h-4 animate-pulse rounded bg-gray-200" style="width: 70%"></div>
          </li>
        }
      </ul>
    } @else if (isEmpty()) {
      <p class="px-3 py-6 text-center text-xs" style="color: #4A4A4F">
        {{ 'internalControl.processes.empty' | transloco }}
      </p>
    } @else {
      <ul class="grid gap-0.5">
        @for (process of processes(); track process.id) {
          <li>
            <app-process-nav-item [process]="process" />
          </li>
        }
      </ul>
    }
  </nav>
</aside>
