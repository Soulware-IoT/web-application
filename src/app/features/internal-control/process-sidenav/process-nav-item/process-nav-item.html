<div class="group relative">
  <button
    type="button"
    (click)="toggle()"
    [attr.aria-expanded]="expanded()"
    class="nav-item grid w-full items-center gap-2 rounded-[2px] py-2 pl-2 pr-9 text-left text-sm font-medium transition-colors"
    style="grid-template-columns: 14px 16px 1fr; color: #4A4A4F"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
      class="transition-transform"
      [style.transform]="expanded() ? 'rotate(90deg)' : 'none'"
    ><polyline points="9 18 15 12 9 6"/></svg>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-7.9a1 1 0 0 1-.8-.4l-1.1-1.5a1 1 0 0 0-.8-.4H4a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1Z"/></svg>
    <span class="marquee"><span class="marquee-inner">{{ process().name }}</span></span>
  </button>

  @if (canManage()) {
    <button
      type="button"
      (click)="edit()"
      [attr.aria-label]="'internalControl.processes.rename_aria' | transloco: { name: process().name }"
      class="absolute right-1.5 top-1/2 grid h-6 w-6 -translate-y-1/2 place-items-center rounded-[2px] opacity-0 transition-opacity hover:bg-black/10 focus-visible:opacity-100 group-hover:opacity-100"
      style="color: #4A4A4F"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </button>
  }
</div>

@if (expanded()) {
  <div class="pl-4">
    @if (formatsLoading()) {
      <ul class="grid gap-0.5 py-1" aria-hidden="true">
        @for (i of [1, 2]; track i) {
          <li class="px-3 py-1.5">
            <div class="h-3.5 animate-pulse rounded bg-gray-200" style="width: 65%"></div>
          </li>
        }
      </ul>
    } @else {
      <ul class="grid gap-0.5">
        @for (format of formats(); track format.id) {
          <li>
            <app-format-nav-item [format]="format" />
          </li>
        }
        @if (canManage()) {
          <li>
            <button
              type="button"
              (click)="createFormat()"
              class="nav-item grid w-full items-center gap-2 rounded-[2px] py-1.5 pl-3 pr-3 text-left text-sm transition-colors"
              style="grid-template-columns: 16px 1fr; color: #64748b"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>{{ 'internalControl.processes.new_format' | transloco }}</span>
            </button>
          </li>
        }
      </ul>
    }
  </div>
}
