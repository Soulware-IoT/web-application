<a
  [routerLink]="['/app/internal-control/formats', format().id]"
  routerLinkActive="active-nav-item"
  class="nav-item group grid items-center gap-2 rounded-[2px] py-1.5 pl-3 pr-3 text-sm transition-colors"
  style="grid-template-columns: 8px 1fr; color: #4A4A4F"
>
  <span
    class="h-2 w-2 rounded-full"
    [style.background-color]="statusColor()"
    [attr.aria-label]="format().status"
    [title]="format().status"
  ></span>
  <span class="marquee"><span class="marquee-inner">{{ format().name }}</span></span>
</a>
