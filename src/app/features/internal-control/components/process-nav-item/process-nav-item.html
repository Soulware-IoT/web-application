<div class="group relative">
  <a
    [routerLink]="process().id"
    routerLinkActive="active-nav-item"
    class="nav-item grid items-center gap-2 rounded-[2px] py-2 pl-3 pr-9 text-sm transition-colors"
    style="grid-template-columns: 16px 1fr; color: #4A4A4F"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span class="marquee">
      <span class="marquee-inner">{{ process().name }}</span>
    </span>
  </a>

  <button
    type="button"
    (click)="edit()"
    [attr.aria-label]="'Renombrar ' + process().name"
    class="absolute right-1.5 top-1/2 grid h-6 w-6 -translate-y-1/2 place-items-center rounded-[2px] opacity-0 transition-opacity hover:bg-black/10 focus-visible:opacity-100 group-hover:opacity-100"
    style="color: #4A4A4F"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
  </button>
</div>
