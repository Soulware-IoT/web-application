<!-- ── Mobile: top bar ───────────────────────────────────────────────────── -->
<header
  class="md:hidden sticky top-0 z-40 grid items-center gap-1 px-5"
  style="grid-template-columns: 1fr auto auto; height: 57px; background-color: #fff; border-bottom: 1px solid #e2e8f0"
>
  <app-sidenav-brand />

  <app-notification-bell />

  <button
    type="button"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    aria-controls="mobile-nav-drawer"
    aria-label="Toggle navigation"
    class="grid h-9 w-9 place-items-center rounded-[2px] transition-colors hover:bg-gray-100"
    style="color: #1a1a1a"
  >
    @if (isOpen()) {
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    }
  </button>
</header>

<!-- ── Mobile: dropdown drawer ──────────────────────────────────────────── -->
<div
  id="mobile-nav-drawer"
  class="mobile-drawer md:hidden fixed left-0 right-0 bottom-0 z-30 overflow-y-auto"
  [class.open]="isOpen()"
  style="top: 57px; background-color: #fff; border-top: 1px solid #e2e8f0; box-shadow: 0 8px 24px rgba(0,0,0,0.08)"
>
  <div class="px-3 py-2 border-b" style="border-color: #e2e8f0">
    <app-sidenav-org-selector />
  </div>
  <app-sidenav-nav />
  <app-sidenav-user />
</div>

<!-- ── Desktop: sidebar ──────────────────────────────────────────────────── -->
<aside
  class="hidden md:grid h-dvh overflow-y-auto"
  style="grid-template-rows: auto 1fr auto; background-color: #fff; border-right: 1px solid #e2e8f0; position: sticky; top: 0"
  aria-label="Sidebar"
>
  <div class="grid gap-2 px-3 pt-4 pb-2">
    <div class="grid items-center gap-1 px-2.5" style="grid-template-columns: 1fr auto">
      <app-sidenav-brand />
      <app-notification-bell />
    </div>
    <app-sidenav-org-selector />
  </div>
  <app-sidenav-nav />
  <app-sidenav-user />
</aside>
