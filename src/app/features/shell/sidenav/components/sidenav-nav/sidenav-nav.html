<nav aria-label="Main navigation">
  <ul class="grid gap-0.5 px-3 py-2">
    @for (item of visibleItems(); track item.route) {
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="active-nav-item"
          class="nav-item grid items-center gap-3 rounded-[2px] px-3 py-2.5 text-sm font-medium transition-colors"
          style="grid-template-columns: 20px 1fr; color: #4A4A4F"
        >
          <span [innerHTML]="item.icon"></span>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</nav>
