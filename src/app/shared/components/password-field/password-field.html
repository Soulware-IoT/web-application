<div class="flex flex-col gap-1.5">
  <label [for]="fieldId()" class="text-sm font-medium" style="color: #4A4A4F">{{ label() }}</label>
  <div class="relative">
    <input
      [id]="fieldId()"
      [type]="visible() ? 'text' : 'password'"
      [formControl]="control()"
      [autocomplete]="autocomplete()"
      class="w-full rounded-[2px] border px-3 py-2.5 pr-11 text-sm outline-none focus:ring-2 focus:ring-offset-0"
      style="border-color: #C5C5CC; background-color: #F2F5FA; color: #1a1a1a"
    />
    <button
      type="button"
      (click)="toggle()"
      [attr.aria-pressed]="visible()"
      [attr.aria-label]="visible() ? ('auth.password_toggle.hide' | transloco) : ('auth.password_toggle.show' | transloco)"
      class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 hover:text-gray-700 focus:outline-none focus-visible:text-gray-900"
    >
      @if (visible()) {
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="h-5 w-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.774 3.162 10.066 7.498a10.523 10.523 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"
          />
        </svg>
      } @else {
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="h-5 w-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
          />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
      }
    </button>
  </div>
  @if (control().touched && control().invalid) {
    <p class="text-xs text-red-600">{{ errorText() }}</p>
  }
</div>
