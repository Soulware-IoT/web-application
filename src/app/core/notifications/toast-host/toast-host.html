<div
  class="pointer-events-none fixed bottom-4 right-4 z-[100] grid gap-2"
  aria-live="polite"
  aria-atomic="false"
>
  @for (toast of toasts(); track toast.id) {
    <div
      class="animate-fade-in pointer-events-auto grid max-w-sm items-center gap-3 rounded-md border bg-white px-3.5 py-2.5 shadow-lg"
      style="grid-template-columns: 18px 1fr auto"
      [style.border-color]="toast.kind === 'error' ? '#fecaca' : toast.kind === 'success' ? '#bbf7d0' : '#e2e8f0'"
      [attr.role]="toast.kind === 'error' ? 'alert' : 'status'"
    >
      @switch (toast.kind) {
        @case ('success') {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        }
        @case ('error') {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        }
        @default {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#0E3B63" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        }
      }

      <p class="text-sm" style="color: #1a1a1a">{{ toast.message }}</p>

      <button
        type="button"
        (click)="dismiss(toast.id)"
        aria-label="Cerrar notificación"
        class="grid h-5 w-5 place-items-center rounded-[2px] transition-colors hover:bg-gray-100"
        style="color: #94a3b8"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  }
</div>
